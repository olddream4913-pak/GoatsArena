name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Debug (ye step temporary hai—problem catch karne ke liye)
      - name: Debug print android/build.gradle.kts
        run: |
          echo "---- android/build.gradle.kts (top 40 lines) ----"
          nl -ba android/build.gradle.kts | sed -n '1,40p'
          echo "---- grep google-services ----"
          grep -n "google-services" android/build.gradle.kts || true

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
